name: Docs issue
description: Something in the README, deslint.com, or rule docs is wrong, missing, or unclear.
title: "[DOCS] <one-line description>"
labels: ["docs", "needs-triage"]
body:
  - type: input
    id: where
    attributes:
      label: Where?
      description: URL or file path — e.g. `deslint.com/docs/getting-started` or `packages/eslint-plugin/README.md`.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What's wrong?
      description: Quote the exact sentence if possible.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional — what should it say instead?
    validations:
      required: false
