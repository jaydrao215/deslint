name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test with coverage
        run: pnpm --filter @deslint/eslint-plugin test -- --coverage
        if: matrix.node-version == 22

      - name: Benchmark rules
        run: pnpm --filter @deslint/eslint-plugin bench
        if: matrix.node-version == 22

      # Rebundle the GitHub Action and fail the build if dist/ drifts
      # from src/. `pnpm build` in the earlier step already produces the
      # bundle via esbuild (see action/package.json#scripts.build), so
      # any drift here means the source changed but the committed
      # dist/index.js wasn't regenerated. Consumers using
      # `uses: jaydrao215/deslint/action@main` always get the latest
      # compiled entry point because CI enforces this invariant.
      - name: Verify action bundle is up to date
        run: |
          if ! git diff --quiet -- action/dist; then
            echo "::error::action/dist is out of date. Run 'pnpm --filter @deslint/action build' and commit the result."
            git --no-pager diff --stat -- action/dist
            exit 1
          fi
        if: matrix.node-version == 22
