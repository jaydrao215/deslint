name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Publish & GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm --filter '!@vizlint/docs' test

      - name: Run benchmark
        run: pnpm --filter eslint-plugin-vizlint bench

      # Publish steps are idempotent: each one checks the npm registry first
      # and skips if the exact name@version is already published. This makes
      # any partial-publish failure (e.g. token scoped wrong, network blip)
      # recoverable by simply re-running the workflow on the same tag — the
      # already-published packages get skipped, the missing ones get pushed.

      - name: Publish @vizlint/shared
        run: |
          PKG="@vizlint/shared"
          VER=$(node -p "require('./packages/shared/package.json').version")
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "✓ ${PKG}@${VER} already published, skipping"
          else
            pnpm --filter "${PKG}" publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish eslint-plugin-vizlint
        run: |
          PKG="eslint-plugin-vizlint"
          VER=$(node -p "require('./packages/eslint-plugin/package.json').version")
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "✓ ${PKG}@${VER} already published, skipping"
          else
            pnpm --filter "${PKG}" publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vizlint/cli
        run: |
          PKG="@vizlint/cli"
          VER=$(node -p "require('./packages/cli/package.json').version")
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "✓ ${PKG}@${VER} already published, skipping"
          else
            pnpm --filter "${PKG}" publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vizlint/mcp
        run: |
          PKG="@vizlint/mcp"
          VER=$(node -p "require('./packages/mcp/package.json').version")
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "✓ ${PKG}@${VER} already published, skipping"
          else
            pnpm --filter "${PKG}" publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract tag version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between this version header and the next
          ENTRY=$(awk "/^## \[${VERSION#v}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$ENTRY" > /tmp/changelog_entry.md
          echo "entry_file=/tmp/changelog_entry.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.entry_file }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
