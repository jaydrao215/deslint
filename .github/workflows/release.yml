name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v0.1.1) — must already match package.json'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Publish & GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Resolve the version from either trigger:
      #   - push of a v*.*.* tag → use ${GITHUB_REF_NAME}
      #   - workflow_dispatch    → use ${{ inputs.version }}
      # Then validate (a) the format and (b) that every publishable
      # package.json already declares this exact version. The package.json
      # check is the safety net that prevents accidentally publishing
      # whatever HEAD happens to be at when someone fat-fingers the dispatch
      # input.
      - name: Resolve & validate version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Version '${VERSION}' must match v*.*.* (optionally with a -prerelease suffix)"
            exit 1
          fi

          STRIPPED="${VERSION#v}"
          for pkg in packages/eslint-plugin packages/cli packages/mcp packages/shared; do
            PKG_VER=$(node -p "require('./${pkg}/package.json').version")
            if [[ "${PKG_VER}" != "${STRIPPED}" ]]; then
              echo "::error::${pkg}/package.json is at '${PKG_VER}' but you asked to publish '${STRIPPED}'. Bump the package versions first."
              exit 1
            fi
          done

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "✓ Resolved & validated: ${VERSION}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm --filter '!@deslint/docs' test

      - name: Run benchmark
        run: pnpm --filter @deslint/eslint-plugin bench

      # Publish steps are idempotent: each one checks the npm registry first
      # and skips if the exact name@version is already published. This makes
      # any partial-publish failure (e.g. token scoped wrong, network blip)
      # recoverable by simply re-running the workflow on the same tag — the
      # already-published packages get skipped, the missing ones get pushed.

      - name: Publish @deslint/shared
        run: |
          PKG="@deslint/shared"
          VER=$(node -p "require('./packages/shared/package.json').version")
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "✓ ${PKG}@${VER} already published, skipping"
          else
            pnpm --filter "${PKG}" publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deslint/eslint-plugin
        run: |
          PKG="@deslint/eslint-plugin"
          VER=$(node -p "require('./packages/eslint-plugin/package.json').version")
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "✓ ${PKG}@${VER} already published, skipping"
          else
            pnpm --filter "${PKG}" publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deslint/cli
        run: |
          PKG="@deslint/cli"
          VER=$(node -p "require('./packages/cli/package.json').version")
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "✓ ${PKG}@${VER} already published, skipping"
          else
            pnpm --filter "${PKG}" publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deslint/mcp
        run: |
          PKG="@deslint/mcp"
          VER=$(node -p "require('./packages/mcp/package.json').version")
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "✓ ${PKG}@${VER} already published, skipping"
          else
            pnpm --filter "${PKG}" publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between this version header and the next
          ENTRY=$(awk "/^## \[${VERSION#v}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$ENTRY" > /tmp/changelog_entry.md
          echo "entry_file=/tmp/changelog_entry.md" >> "$GITHUB_OUTPUT"

      # softprops/action-gh-release@v2 will create the tag at the current
      # commit if it doesn't already exist (the workflow_dispatch path),
      # and update the existing release in place if one is already there
      # (the push-tag path or a re-run).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.entry_file }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
