name: 'Deslint Design Review'
description: 'Run Deslint design quality checks on pull requests and post a Design Health Score comment.'
author: 'Deslint'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for posting PR comments and check status.'
    required: true
    default: ${{ github.token }}
  min-score:
    description: 'Minimum Design Health Score (0-100). PR check fails below this threshold.'
    required: false
    default: '0'
  config-path:
    description: 'Path to .deslintrc.json config file.'
    required: false
    default: ''
  working-directory:
    description: 'Working directory for the scan.'
    required: false
    default: '.'
  file-patterns:
    description: 'Glob patterns for frontend files (comma-separated).'
    required: false
    default: '**/*.tsx,**/*.jsx,**/*.vue,**/*.svelte,**/*.html'
  strict-trailer:
    description: >-
      When "true", fail the check if the head commit lacks a valid
      `Deslint-Compliance:` trailer or its values do not match the
      server-side re-scan. Default is "false" so enabling trailer
      verification lands non-breaking.
    required: false
    default: 'false'

outputs:
  score:
    description: 'Design Health Score (0-100)'
  total-violations:
    description: 'Total number of violations found'
  passed:
    description: 'Whether the score met the minimum threshold (true/false)'
  trailer-verified:
    description: >-
      "true" when the Deslint-Compliance trailer on the head commit
      matched the server-side re-scan, "false" otherwise.
  trailer-status:
    description: >-
      One of: verified | missing | mismatched | malformed | skipped.
      Useful for downstream workflows that want to react to the specific
      failure mode.

runs:
  using: 'node20'
  main: 'dist/index.js'
